<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4EDFC"/>
      <stop offset="100%" stop-color="#EAF3DE"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#sky)"/>
  <!-- Hills -->
  <ellipse cx="250" cy="330" rx="300" ry="80" fill="#639922" opacity="0.15"/>
  <ellipse cx="600" cy="350" rx="350" ry="90" fill="#639922" opacity="0.12"/>
  <!-- Ground -->
  <rect x="0" y="300" width="800" height="150" fill="#EAF3DE"/>
  <rect x="0" y="300" width="800" height="8" fill="#639922" opacity="0.2" rx="4"/>
  <!-- Strawberry rows -->
  <g transform="translate(0,0)">
    <!-- Row 1 -->
    <g transform="translate(200,320)">
      <ellipse rx="12" ry="8" fill="#639922" opacity="0.3"/>
      <circle cx="-3" cy="-8" r="8" fill="#E05252" opacity="0.7"/>
      <circle cx="5" cy="-10" r="7" fill="#D94444" opacity="0.7"/>
    </g>
    <g transform="translate(300,330)">
      <ellipse rx="14" ry="8" fill="#639922" opacity="0.3"/>
      <circle cx="-2" cy="-9" r="9" fill="#E05252" opacity="0.7"/>
      <circle cx="7" cy="-8" r="6" fill="#D94444" opacity="0.6"/>
    </g>
    <g transform="translate(400,325)">
      <ellipse rx="13" ry="8" fill="#639922" opacity="0.3"/>
      <circle cx="0" cy="-9" r="8" fill="#E05252" opacity="0.7"/>
      <circle cx="-8" cy="-7" r="6" fill="#D94444" opacity="0.6"/>
    </g>
    <g transform="translate(500,335)">
      <ellipse rx="12" ry="8" fill="#639922" opacity="0.3"/>
      <circle cx="2" cy="-8" r="8" fill="#E05252" opacity="0.65"/>
    </g>
    <g transform="translate(600,320)">
      <ellipse rx="14" ry="8" fill="#639922" opacity="0.3"/>
      <circle cx="-4" cy="-9" r="9" fill="#E05252" opacity="0.7"/>
      <circle cx="6" cy="-7" r="6" fill="#D94444" opacity="0.6"/>
    </g>
    <!-- Leaves -->
    <g fill="#27500A" opacity="0.5">
      <ellipse cx="197" cy="308" rx="6" ry="3" transform="rotate(-30,197,308)"/>
      <ellipse cx="298" cy="317" rx="7" ry="3" transform="rotate(-20,298,317)"/>
      <ellipse cx="400" cy="312" rx="6" ry="3" transform="rotate(-25,400,312)"/>
      <ellipse cx="502" cy="323" rx="5" ry="3" transform="rotate(-30,502,323)"/>
      <ellipse cx="596" cy="307" rx="7" ry="3" transform="rotate(-20,596,307)"/>
    </g>
  </g>
  <!-- Sun -->
  <circle cx="650" cy="80" r="35" fill="#FFC940" opacity="0.3"/>
  <circle cx="650" cy="80" r="22" fill="#FFC940" opacity="0.5"/>
  <!-- Clouds -->
  <g fill="white" opacity="0.5">
    <ellipse cx="180" cy="70" rx="40" ry="18"/>
    <ellipse cx="210" cy="65" rx="30" ry="15"/>
    <ellipse cx="450" cy="55" rx="35" ry="14"/>
    <ellipse cx="475" cy="50" rx="28" ry="12"/>
  </g>
  <text x="400" y="395" text-anchor="middle" font-family="Hiragino Sans,Noto Sans JP,sans-serif" font-size="22" fill="#27500A" font-weight="bold">あっきらきら農園</text>
  <text x="400" y="425" text-anchor="middle" font-family="Hiragino Sans,Noto Sans JP,sans-serif" font-size="14" fill="#639922">旬のフルーツを楽しもう</text>
</svg>
